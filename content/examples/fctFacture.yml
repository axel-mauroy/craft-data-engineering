# fctFacture.yml (dbt Model Contract)
# Ce fichier définit le contrat formel pour le modèle fctFacture.sql

  - name: fctFacture
    description: "Modèle de faits centralisant les factures agrégées par factureId (Data Contract)"
    config:
      contract:
        enforced: true  # dbt garantit que le schéma SQL correspond exactement à ces définitions
    
    columns:
      - name: factureId
        description: "Identifiant unique de la facture (Clé primaire)"
        data_type: string
        constraints:
          - type: not_null
        tests:
          - unique
          - not_null

      - name: clientId
        description: "Identifiant du client associé"
        data_type: string
        constraints:
          - type: not_null

      - name: magasinId
        description: "Identifiant du magasin d'émission"
        data_type: string
        constraints:
          - type: not_null

      - name: dateCreation
        description: "Date de création de la facture (UTC)"
        data_type: date
        constraints:
          - type: not_null

      - name: statutFacture
        description: "Statut de la facture (ex: VALIDEE, ANNULEE)"
        data_type: string
        constraints:
          - type: not_null

      - name: montantHt
        description: "Montant total hors taxes"
        data_type: numeric
        constraints:
          - type: not_null

      - name: quantiteTotaleArticles
        description: "Nombre total d'articles dans la facture"
        data_type: integer
        constraints:
          - type: not_null

      - name: montantTvaTotal
        description: "Montant total de la TVA"
        data_type: numeric
        constraints:
          - type: not_null

      - name: montantTtc
        description: "Montant total toutes taxes comprises (montantHt + montantTvaTotal)"
        data_type: numeric
        constraints:
          - type: not_null
