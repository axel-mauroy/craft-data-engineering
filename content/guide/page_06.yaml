page_number: 6
title: "Clean Code & Refactoring"
subtitle: "Le code est écrit pour les humains, les données pour les machines"
content:
  - |
    **SOLID en Data Engineering :** Appliquez les fondamentaux pour des pipelines robustes.

    **S - Single Responsibility :** Appliqué à dbt : un modèle = une transformation = une responsabilité unique. Évitez les modèles "fourre-tout" de 1000 lignes.

    **O - Open/Closed Principle :** Un pipeline doit être ouvert à l'extension, fermé à la modification. En dbt, tu n'édites pas un modèle existant pour ajouter une nouvelle règle métier complexe au risque de tout casser - tu crées un nouveau modèle en aval qui étend le comportement, ou tu utilises des macros testées unitairement.

    **L - Liskov Substitution Principle :** Toute implémentation d'une interface doit être substituable sans casser le consommateur. En Data Engineering : si la source physique change (passage de requêtes fédérées PostgreSQL à l'ingestion native BigQuery), le modèle intermédiaire `intFactures.sql` ne doit pas le savoir. L'Adapter (Staging) est substituable, le Domain reste intact.

    **I - Interface Segregation Principle :** Ne force pas un consommateur à dépendre de données dont il n'a pas besoin. En dbt Mesh : le domaine Compta ne doit pas consommer le modèle `fctFactureEnrichie` entier si seuls `factureId` et `montantTtc` lui sont utiles. Expose des interfaces minimales via les contrats de modèles ou des vues dédiées.

    **D - Dependency Inversion Principle :** Les modules de haut niveau ne doivent pas dépendre des modules de bas niveau - les deux doivent dépendre d'abstractions. En Data Engineering : votre service métier ne doit pas dépendre de `google.cloud.bigquery`. Il dépend d'une interface `FactureRepository` que BigQuery ou DuckDB implémentent. Voir [SOLID DIP (solid_dip.py)](https://github.com/axel-mauroy/craft-data-engineering/blob/main/content/examples/solid_dip.py).

    **Le rôle de dbt dans ce schéma :** dbt fournit le **Read Model** (le contrat physique), qui sert de point d'ancrage à l'Adapter. Le Domaine reste ainsi totalement agnostique de la technologie de stockage.

    **Nommage & Intention :** Donnez un but clair à chaque variable. `df_cleaned` est une défaite ; préférez `factures_validees`.

    `factures_validees_sans_doublons` viole plusieurs principes établis :
    - **Clean Code (Martin) :** Le nom doit exprimer l'intention, pas l'implémentation. `sans_doublons` documente le *comment* (déduplication), pas le *quoi*.
    - **Ubiquitous Language (Evans) :** Le nom doit appartenir au vocabulaire métier. `sans_doublons` est un artefact technique invisible au domaine.
    - **SLAP (Single Level of Abstraction Principle) :** Mélanger la sémantique métier (`validees`) et le détail technique (`sans_doublons`) dans un même identifiant crée une fuite d'abstraction.

    La déduplication est un invariant garanti par la couche de transformation - elle n'a pas à apparaître dans le nom de la variable résultante, exactement comme on n'écrit pas `liste_triee_sans_null` mais `collaborateurs_actifs`.
  - "**L'Automatisme de la Qualité :** Ne laissez jamais un débat sur l'indentation polluer une revue de code. Utilisez **Ruff** (par Astral) pour le Python et **SQLFluff** pour le SQL/dbt."
  - "**Fonctions Pures & Isolation :** Isolez vos calculs métiers dans des fonctions sans effets de bord. Cela les rend prévisibles, réutilisables et surtout, testables unitairement."
  - "**Refactoring vs Rewrite :** Le refactoring est une amélioration continue et sécurisée de la structure sans changer le comportement. Ne confondez pas 'nettoyer' et 'tout réécrire'."
  - "**Le Code comme Matière Vivante :** Un pipeline n'est jamais figé. Si vous identifiez une fragilité ou une zone d'ombre, traitez-la immédiatement pour éviter l'accumulation de dette technique."
references:
  - "Robert C. Martin (Clean Code)"
  - "Martin Fowler (Refactoring)"
  - "Astral (Ruff)"
  - "SQLFluff (SQL Linter)"
