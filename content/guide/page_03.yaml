page_number: 3
title: "Architecture Hexagonale & DDD"
subtitle: "Isolez le domaine, libérez le pipeline"
content:
  - "### Fondations Conceptuelles"
  - "**Le DDD stratégique, le 'quoi' :** Cartographie du territoire et identification des contextes. C'est décider quel contexte est coeur de métier (Core) et lequel est générique."
  - "**Le DDD tactique, le 'comment' :** Modélisation via entities, aggregates, value objects et repositories. En Data Engineering, un **Aggregate** est l'unité atomique de donnée : on ne doit jamais couper ses invariants entre deux modèles dbt."
  - "**Priorité Stratégique :** La tactique sans stratégie est vouée à l'échec : c'est poser des fenêtres sur une maison sans fondations. Mener une réflexion stratégique (frontières claires) prime sur la perfection de la mise en oeuvre initiale."
  - "**Méthodologie de Transition :** Le DDD stratégique (interviews, analyse) clarifie la vision à la cible. Le refactoring se fait ensuite en douceur via [Strangler Fig](https://martinfowler.com/bliki/StranglerFigApplication.html) ou [Mikado](https://www.mathieueveillard.com/formation/l-art-du-refactoring)."
  - "### Patterns d'Implémentation"
  - "**Bounded Contexts (Mapping) :** Traduisez le DDD en objets physiques. Le domaine 'Ventes' écrit dans `prdSalesDomain`, isolé du domaine 'Logistics'."
  - "**Ubiquitous Language :** Le vocabulaire métier dicte le nom des champs. Si le métier parle de 'Date de Commande', on modélise `dateCommande`, documenté dans Collibra et synchronisé avec dbt (via meta)."
  - "**Le Domaine d'abord :** La logique de transformation de la donnée est votre actif le plus précieux. Elle ne doit jamais dépendre du moteur technique (Spark, SQL). Isolez-la dans un 'Domain' pur et testable. Voir [Isolation du Domaine (domain.sql)](https://github.com/axel-mauroy/craft-data-engineering/blob/main/content/examples/domain.sql)."
  - "### Architecture & Outils Data"
  - "**Data Mesh :** C'est l'application du DDD à l'analytique. L'objectif est de décentraliser la propriété de la donnée vers les domaines métiers (Ex: 'Supply Chain', 'Ventes') plutôt que d'avoir un goulot d'étranglement centralisé."
  - "**Architecture dbt Mesh :** Utilisez dependencies.yml pour des dépôts Git séparés (Multi-projets) ou un Monorepo partitionné par dossiers métiers (ex: `models/sales/`, `models/supplyChain/`)."
  - "**Modélisation SQL d'Expert :** Exploitez le partitionnement et le clustering natifs BigQuery. Voir [fctFacture.sql](https://github.com/axel-mauroy/craft-data-engineering/blob/main/content/examples/fctFacture.sql)."
