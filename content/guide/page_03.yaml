page_number: 3
title: "Architecture Hexagonale & DDD"
subtitle: "Isolez le domaine, libérez le pipeline"
content:
  - "### Fondations Conceptuelles"
  - "**Le DDD stratégique, le 'quoi' :** Cartographie du territoire et identification des contextes. C'est décider quel contexte est coeur de métier (Core) et lequel est générique."
  - "**DDD tactique, le 'comment' :** Modélisation via entities, [aggregates](https://github.com/axel-mauroy/craft-data-engineering/blob/main/content/examples/aggregate.md), [value objects](https://github.com/axel-mauroy/craft-data-engineering/blob/main/content/examples/Entity_and_value_object.md) et [repositories](https://github.com/axel-mauroy/craft-data-engineering/blob/main/content/examples/Repository.md). En Data Engineering, un **Aggregate** est l'unité atomique de donnée : on ne doit jamais couper ses invariants entre deux modèles dbt."
  - "**Priorité Stratégique :** La tactique sans stratégie est vouée à l'échec : c'est poser des fenêtres sur une maison sans fondations. Mener une réflexion stratégique (frontières claires) prime sur la perfection de la mise en oeuvre initiale."
  - "**Méthodologie de Transition :** Le DDD stratégique (interviews, analyse) clarifie la vision à la cible. Le refactoring se fait ensuite en douceur via [Strangler Fig](https://martinfowler.com/bliki/StranglerFigApplication.html) ou [Mikado](https://mikadomethod.info/)."
  - "### Patterns d'Implémentation"
  - "**Bounded Contexts (Mapping) :** Traduisez le DDD en objets physiques. Le domaine 'Ventes' écrit dans `prdSalesDomain`, isolé du domaine 'Logistics'."
  - "**Access Modifiers (dbt native) :** Renforcez l'isolation via les modificateurs d'accès : **Privé** (logique interne au domaine), **Protégé** (utilisable dans le projet) et **Public** (interface stable servant de 'Data Product' pour l'organisation)."
  - "**Anti-Corruption Layer (ACL) :** Pattern de traduction entre domaines. Pour éviter que le schéma 'Logistics' ne vienne **polluer** le domaine 'Sales', créez un modèle intercalaire (ex: `stg_logistics_for_sales.sql`) qui adapte et nettoie la donnée entrante."
  - "**Ubiquitous Language :** Le vocabulaire métier dicte le nom des champs. Si le métier parle de 'Date de Commande', on modélise `dateCommande`, documenté dans Collibra et synchronisé avec dbt (via meta)."
  - "**Le Domaine d'abord :** Distinguez la **logique de décision** (services applicatifs) de la **logique analytique**. Si les macros isolent pragmatiquement le SQL, la 'Single Source of Truth' moderne est le **dbt Semantic Layer** : il centralise les KPIs au-dessus des modèles, garantissant une définition unique et cohérente pour tous les outils BI. Voir [Isolation de la Logique Analytique (domain.sql)](https://github.com/axel-mauroy/craft-data-engineering/blob/main/content/examples/domain.sql)."
  - "### Architecture & Outils Data"
  - "**Data Mesh :** Applique le principe des Bounded Contexts à la propriété de la donnée. L'objectif est de décentraliser la responsabilité vers les domaines métiers (Ex: 'Supply Chain', 'Ventes') plutôt que d'avoir un goulot d'étranglement centralisé."
  - "**Architecture dbt Mesh :** Utilisez dependencies.yml pour des dépôts Git séparés (Multi-projets) ou un Monorepo partitionné par dossiers métiers (ex: `models/sales/`, `models/supplyChain/`)."
