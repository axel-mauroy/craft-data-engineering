page_number: 3
title: "Architecture Hexagonale"
subtitle: "Isolez le domaine, libérez le pipeline"
content:
  - "Le Domaine d'abord (Evans, DDD) : La logique de transformation de la donnée est votre actif le plus précieux. Il ne doit jamais dépendre de Spark, SQL, ou d'un fichier S3. Isolez-le dans un 'Domain' pur et testable."
  - "Ports & Adapters (Alistair Cockburn) : Définissez des Ports (interfaces abstraites) pour vos sources et destinations. Les Adapters (Spark, dbt, API REST) sont des détails interchangeables qui implémentent ces ports."
  - "La Dependency Rule (Clean Architecture, Martin) : Les dépendances ne pointent que vers l'intérieur. Votre Domain ne sait pas que BigQuery existe ; c'est BigQuery que l'on adapte à lui."
  - "Testabilité maximale (Architecture Patterns with Python, Percival & Gregory) : Un Domain isolé se teste avec de simples listes Python, sans cluster Spark, sans réseau. Les tests unitaires s'exécutent en millisecondes."
  - "Migration technologique sans douleur (Vernon, VVDDD) : Migrer de Spark vers DuckDB ne touche que les Adapters. Le Domain et ses règles métier ne bougent pas d'un iota."
