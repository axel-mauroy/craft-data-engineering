page_number: 7
title: "Idempotence & Stratégies d'écriture"
subtitle: "Garantir la fiabilité par la répétabilité"
content:
  - "**Le Principe d'Idempotence :** Un pipeline doit être rejouable à l'infini sur une période donnée sans altérer le résultat final. C'est le fondement de la résilience et de la capacité de reprise sur erreur."
  - "**Stratégie Merge (Upsert) :** Indispensable pour les **SCD Type 1** (écrasement de l'historique, seul l'état courant est conservé). Elle synchronise les cibles en mettant à jour l'existant via une `unique_key`."
  - "**Insert Overwrite & Partitionnement :** La stratégie de choix pour les architectures Big Data. Elle remplace dynamiquement des partitions entières, assurant une isolation parfaite et des performances optimales."
  - "**Microbatch (dbt 1.9+) :** Pour les flux massifs de séries temporelles. Traitez vos données par fenêtres temporelles isolées pour minimiser l'impact des I/O et faciliter les reprises partielles."
  - "**Delete+Insert :** Le fallback indispensable pour les moteurs sans support du `Merge`. Elle garantit l'absence de doublons en nettoyant la cible avant l'insertion."
  - "**Change Data Capture (CDC) :** Capturez les événements à la source (via Debezium ou Fivetran) plutôt que de poller les tables. Le 'polling' (`WHERE updated_at > last_run`) est un anti-pattern risquant la perte de données."
  - "**Optimisation Native du Moteur :** Exploitez le partitionnement (Date/Int) et le clustering (Haute cardinalité) pour minimiser le scan de données. Voir [fctFacture.sql](https://github.com/axel-mauroy/craft-data-engineering/blob/main/content/examples/fctFacture.sql) pour BigQuery."
  - "**Isolation & Robustesse :** Le choix de la stratégie d'écriture définit la limite de charge et la tolérance aux pannes de votre système. Ne laissez jamais le hasard choisir votre méthode d'insertion."
references:
  - "dbt (Incremental Strategies)"
  - "Debezium (Change Data Capture)"
  - "Ralph Kimball (SCD Types)"
