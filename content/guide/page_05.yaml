page_number: 5
title: "Stratégie de Test & Qualité"
subtitle: "La donnée est du code : testez-la"
content:
  - "**La Pyramide de Test Data :** Hiérarchisez l'effort : Tests Unitaires, Model Contracts, et Tests d'Intégration. Le package open-source **dbt-expectations** est roi ici : il transpose la puissance de *Great Expectations* directement en SQL/Jinja. *(💡 Pro-Tip : Testez l'intégrité structurelle de vos jointures avec `expect_table_row_count_to_equal_other_table` pour garantir que votre modèle n'a pas décuplé de lignes par rapport à sa source)*. Voir [Testing Mastery (test_mastery.md)](https://github.com/axel-mauroy/craft-data-engineering/blob/main/content/examples/test_mastery.md)."
  - "**Test-Driven Data (TDD) :** Définissez vos attentes avant d'écrire la transformation. Le TDD force à penser aux cas limites (NULL, doublons). Contrairement au *profiling* de données (qui découvre l'existant), le TDD dicte la véritable intention métier en amont. Voir [TDD Mastery (tdd_mastery.md)](https://github.com/axel-mauroy/craft-data-engineering/blob/main/content/examples/tdd_mastery.md)."
  - "**Fail-Fast Checkpoints :** Distinguez deux barrières protectrices. Le *Model Contract* échoue à la compilation (DDL) si le schéma dévie. Les *Data Tests* échouent à l'exécution. Dans dbt, utilisez la commande magique `dbt build` : si un test échoue, l'exécution des calculs *downstream* (les dépendances) est automatiquement bloquée."
  - "**Environnements Éphémères (Testcontainers) :** Validez vos connecteurs applicatifs en isolant l'infrastructure. Utilisez des containers Docker jetables (ex: base PostgreSQL programmatique) pour garantir des tests d'intégration reproductibles, évitant la pollution de bases de développement partagées."
  - "**Data Docs & Observabilité :** L'automatisation CI/CD est clé. La commande `dbt docs generate` compile métadonnées et lignage en fichiers JSON, hébergeables de manière statique (S3, Netlify). Ce catalogue, couplé aux métriques de la CLI **Elementary**, restaure la confiance des utilisateurs finaux."
  - "**Profiling vs Intention Métier :** L'utilisation de profilers de données est excellente pour générer un premier filet de sécurité sur des sources inconnues. Néanmoins, ce socle généré automatiquement vient compléter - et non remplacer - la démarche TDD stricte portée par les ingénieurs."
references:
  - "Martin Fowler (The Testing Pyramid)"
  - "dbt-expectations (Great Expectations Port)"
  - "dbt (dbt build & Docs)"
  - "Testcontainers"
  - "Elementary (Data Observability)"