page_number: 4
title: "Data Contracts & Typage Fort"
subtitle: "L'accord formel entre l'ingénierie logicielle et la donnée"
content:
  - "**Le Hub du Data Mesh :** Un Data Contract est l'accord formel qui lie les Domaines entre eux. Dans dbt, cet accord repose sur la combinaison d'un contrat strict et d'un **Access Modifier** défini sur `Public`. Un modèle public devient la véritable interface (le *Data Product*) consommable par d'autres projets, et son contrat garantit la stabilité de cette interface."
  - "**L'API de la Donnée & Model Versions :** Considérez vos modèles publics comme **l'API de votre base de données**. Pour qu'une API soit robuste, elle doit évoluer sans casser les systèmes en aval. dbt gère cela via les **Model Versions** : en cas de *breaking change* (suppression d'une colonne, changement de type, ou retrait de contrainte type `not_null`), on crée une version `v2` tout en maintenant la `v1` avec une `deprecation_date`. L'ajout pur d'une nouvelle colonne n'est pas un breaking change. Pour consommer l'API, les domaines aval utilisent l'argument de version : `{{ ref('projet', 'modele', v=2) }}` (en l'absence de l'argument `v`, dbt pointe automatiquement vers la `latest_version`)."
  - "**Contrats vs Tests (dbt native) :** Distinguez strictement l'interface du contenu. Le **Model Contract** garantit la forme du jeu de données (schéma et types) ; s'il n'est pas respecté (ex: boolean vers integer), dbt empêche simplement la construction du modèle (le véritable *Fail Fast*). Les **Data Tests**, quant à eux, valident les anomalies de contenu après la construction."
  - "**Surveillance & Quarantaine :** Les anomalies de contenu (Data Tests) ne doivent pas forcément planter un traitement batch de 50 millions de lignes. Le Craftsman isole la ligne fautive en Quarantaine (Dead Letter Queue) pour préserver le pipeline. Des outils d'observabilité comme **Elementary** sont excellents pour surveiller ces tests de données en continu et vous alerter en temps réel."
  - "**Outils de l'Écosystème Craft :** Bien que les contrats dbt soient natifs, une architecture robuste s'appuie sur des outils complémentaires parfaitement alignés avec le Data Mesh : **Pydantic** et **Pandera** pour valider la donnée entrante (Ingestion Python/Spark), et **Collibra** pour lier l'application des schémas physiques à une gouvernance d'entreprise mécanique. Voir [Data Contracts Mastery](https://github.com/axel-mauroy/craft-data-engineering/blob/main/content/examples/data_contract_mastery.md)."
  - "**Confiance & Vélocité :** Sans contrats, l'équipe data passe 80% de son temps à nettoyer le chaos ; avec des contrats stricts et versionnés en amont, elle passe 100% de son temps à créer de la valeur métier."
references:
  - "Chad Sanderson (Data Contracts)"
  - "dbt (Model Contracts & Model Versions)"
  - "Elementary (Data Visibility)"
