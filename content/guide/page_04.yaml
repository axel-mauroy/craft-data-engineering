page_number: 4
title: "Data Contracts & Typage Fort"
subtitle: "L'accord formel entre l'ingénierie logicielle et la donnée"
content:
  - "Définir l'Attente : Un Data Contract est un accord formel décrivant le schéma, la sémantique et la qualité attendue de la donnée, liant les producteurs aux consommateurs."
  - "**Data Contracts (dbt >= 1.5) :** Les modèles d'interface (ex: Ventes vers Compta) doivent avoir des contrats stricts (typage fort, nullité, sémantique). L'alliance dbt/Collibra garantit le respect physique de ce contrat avant même le déploiement. Voir [Data Contracts Mastery](https://github.com/axel-mauroy/craft-data-engineering/blob/main/content/examples/data_contract_mastery.md)."
  - "**Observabilité avec Elementary :** Pour vos interfaces critiques, utilisez Elementary pour tester ces contrats en continu et alerter en temps réel. C'est l'assurance qu'aucune anomalie ne casse silencieusement vos flux."
  - "Shifting Left : Principe emprunté au DevOps et appliqué à la data : repoussez la responsabilité de la qualité à la source. Une donnée invalide doit échouer à l'émission ('Fail Fast') plutôt que de polluer vos couches d'analyse."
  - "**Validation Multi-langage :** Utilisez **Pydantic** pour valider vos objets Python (Ingestion, API) et **Pandera** pour vos DataFrames (Pandas, Polars, Spark). Ces outils transforment une donnée brute non typée en un contrat métier garanti."
  - "Isolation des Changements : Les contrats empêchent les 'silent failures'. Considérez-les comme **L'API de votre base de données** : ils stabilisent les interfaces et libèrent le refactoring interne."
  - "Confiance & Vélocité : Sans contrats, l'équipe data passe 80% de son temps à nettoyer ; avec contrats, elle passe 100% de son temps à créer de la valeur métier."
references:
  - "Chad Sanderson (Data Contracts)"
  - "dbt (Model Contracts)"
  - "Elementary (Data Visibility)"
