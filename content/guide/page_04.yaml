page_number: 4
title: "Data Contracts & Typage Fort"
subtitle: "L'accord formel entre l'ingénierie logicielle et la donnée"
content:
  - "Le Hub du Data Mesh : Un Data Contract est l'accord formel qui lie les Domaines entre eux. Il décrit le schéma, la sémantique et la qualité que le Domaine Producteur (ex: 'Supply Chain') garantit au Domaine Consommateur (ex: 'Commerce')."
  - "**dbt Mesh & Contrats (dbt >= 1.10) :** L'autonomie sans règles, c'est l'anarchie. Les modèles d'interface inter-domaines nécessitent des contrats stricts via le `dependencies.yml`. L'alliance dbt/Collibra garantit le respect mécanique de ces contrats à l'échelle de l'entreprise. Voir [Data Contracts Mastery](https://github.com/axel-mauroy/craft-data-engineering/blob/main/content/examples/data_contract_mastery.md)."
  - "**Observabilité avec Elementary :** Pour vos interfaces critiques, utilisez Elementary pour tester ces contrats en continu et alerter en temps réel. C'est l'assurance qu'aucune anomalie ne casse silencieusement vos flux."
  - "Shifting Left & Quarantaine : Repousse la qualité à la source. Le 'Fail Fast' est idéal, mais planter un traitement batch de 50 millions de lignes pour un ticket invalide est irrecevable en production. Le Craftsman isole la ligne fautive en Quarantaine (Dead Letter Queue) : le pipeline métier aboutit, et l'anomalie est gérée en aval."
  - "**Validation Multi-langage :** Utilisez **Pydantic** pour valider vos objets Python (Ingestion, API) et **Pandera** pour vos DataFrames (Pandas, Polars, Spark). Ces outils transforment une donnée brute non typée en un contrat métier garanti."
  - "Isolation des Changements : Les contrats empêchent les 'silent failures'. Considérez-les comme **L'API de votre base de données** : ils stabilisent les interfaces et libèrent le refactoring interne."
  - "Confiance & Vélocité : Sans contrats, l'équipe data passe 80% de son temps à nettoyer ; avec contrats, elle passe 100% de son temps à créer de la valeur métier."
references:
  - "Chad Sanderson (Data Contracts)"
  - "dbt (Model Contracts)"
  - "Elementary (Data Visibility)"
