page_number: 2
title: "Environnement & Productivité"
subtitle: "L'excellence commence par un setup agile"
content:
  - "**Le Setup comme Premier Produit Craft :** Votre environnement n'est pas un accessoire, c'est une extension de votre pensée. Un setup fluide élimine la friction cognitive et libère votre créativité technique."
  - "**L'Automatisation du Quotidien :** Si une tâche est répétitive, elle est une anomalie. Scriptez vos workflows (justfile, alias) pour passer 100% de votre temps sur la résolution de problèmes complexes."
  - "**Gestion de Dépendances Moderne :** Adoptez des outils fulgurants comme **uv** pour Python. La rapidité d'installation et la reproductibilité des environnements sont les socles de votre vélocité."
  - "**L'IDE Agentique :** Ne codez plus seul. Intégrez Antigravity / Claude Code pour démultiplier vos capacités de refactoring et garantir la conformité aux standards du projet (rules, skills)."
  - "**Maîtrise des Outils de Précision :** Votre IDE et votre Terminal (Zsh) sont vos scalpels. Raccourcis, navigation intelligente et plugins robustes (Git, Docker) doivent être une seconde nature."
  - "**Raycast : Naviguer à la Vitesse de la Pensée :** Utilisez Raycast comme centre de commande (Snippets, JSON Formatter, JWT Decoder) pour manipuler l'information instantanément."
  - "**Hardware & Confort :** Un ordinateur portable premium 16'. Puissance locale et surface visuelle nécessaires pour rester productif, même en configuration nomade."
