page_number: 2
title: "Environnement & Productivité"
subtitle: "Tooling propre, esprit serein"
content:
  - "Automatisez tout ce qui est répétitif : Si vous le faites plusieurs fois par jour, scriptez-le. Un artisan ne perd pas son temps sur des tâches répétitives."
  - "Utilisez des gestionnaires de dépendances modernes : 'uv' en Python est devenu le standard de rapidité et de fiabilité pour vos projets."
  - "Maîtrisez votre IDE : Les raccourcis clavier et la navigation intelligente sont vos outils de précision pour manipuler votre base de code sans friction."
  - "IA & Productivité : Adoptez un IDE agentique comme Antigravity pour démultiplier votre capacité de refactoring complexe et de génération de code conforme aux standards 'Craft'."
  - "Terminal & Shell : OhMyZsh pour la rapidité d'exécution sur le terminal, couplé à des alias et des plugins robustes (git, docker, etc.)."
  - "Hardware : MacBook Pro (Apple Silicon) en 16 pouces pour la puissance brute locale et le confort visuel indispensable en configuration mono-écran."
  - "Navigation OS : Raycast et son écosystème d'extensions (Snippets, JSON Formatter, JWT Decoder) pour naviguer dans votre OS à la vitesse de la pensée."
