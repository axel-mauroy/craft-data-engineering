page_number: 9
title: "Observabilité & Monitoring"
subtitle: "Ne devinez pas, mesurez"
content:
  - "**Data Observability Dynamic :** Au-delà des contrats statiques (page 4), utilisez **Elementary** pour détecter les anomalies de volume, de fraîcheur et de schéma en temps réel avant l'utilisateur final."
  - "**Standard d'Observabilité Agnostique :** Adoptez **OpenTelemetry** pour centraliser et corréler vos logs, métriques et traces. Évitez les silos propriétaires (ELK, Datadog) sans principe unificateur."
  - "**SLAs vs SLOs : Clarifier l'Engagement :** Distinguez vos **SLOs** (objectifs internes : fraîcheur < 1h) de vos **SLAs** (engagements contractuels métiers). Mesurez la dérive pour agir avant la rupture du service."
  - "**Lineage & Analyse d'Impact :** Visualisez le parcours de la donnée via **OpenLineage** ou **DataHub**. Anticipez l'impact d'un changement en amont pour éviter les régressions en cascade."
  - "**Alerting Intelligent & Actionnable :** Évitez la fatigue des alertes. Ne notifiez que sur des événements critiques nécessitant une intervention humaine immédiate. Une alerte sans action est un bruit toxique."
  - "**Culture de la Post-Mortem :** Apprenez de chaque incident. Documentez les causes racines pour améliorer continuellement la résilience de vos pipelines et de votre infrastructure."
references:
  - "Elementary Data (dbt-native)"
  - "OpenTelemetry (Observability Standard)"
  - "OpenLineage & DataHub (Lineage)"
  - "Google SRE Book (SLAs vs SLOs)"
