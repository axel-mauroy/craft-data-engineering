page_number: 10
title: "DataOps & CI/CD"
subtitle: "L'usine à pipelines de confiance"
content:
  - "**Automatisation Totale (CI/CD) :** Chaque commit est une promesse de qualité. Automatisez vos tests unitaires, d'intégration et de qualité de donnée dans la CI/CD pour rejeter l'erreur avant la production."
  - "**Images Docker Modernes (uv) :** Optimisez vos images pour la production. [Exemple Dockerfile (Expert uv)](https://github.com/axel-mauroy/craft-data-engineering/blob/main/content/examples/Dockerfile). Séparez l'étape de construction (build) de l'étape d'exécution (run) pour garantir des containers légers."
  - "**Slim CI & Environnements Éphémères :** Validez vos transformations sur des échantillons représentatifs dans des schémas jetables. [Exemple Slim CI (Python/dbt)](https://github.com/axel-mauroy/craft-data-engineering/blob/main/content/examples/slim_ci_snowflake_dbt.py)."
  - "**Stratégies de Déploiement Data :** Appliquez le **Blue/Green** (déployez en parallèle, comparez les résultats) ou le **Canary** (basculez progressivement le trafic de données). Ne remplacez l'existant qu'après validation de la parité."
  - "**Provenance du Code vs Lineage :** Tandis que la page 9 traite du parcours de la donnée, assurez ici la provenance : la capacité à remonter d'un dataset final au commit Git exact du code qui l'a produit."
  - "**L'Esprit DataOps :** Plus qu'une suite d'outils, c'est l'engagement de l'équipe envers la livraison continue de valeur métier fiable, rapide et sans dette technique."
references:
  - "Docker (Multi-stage Builds)"
  - "DataOps Manifesto (dataopsmanifesto.org)"
  - "Andy Palmer & Lenny Liebmann (DataOps Principles)"
