page_number: 1
title: "Mindset du Data Craftsman"
subtitle: "L'excellence technique au service de la donnée"
content:
  - "**Ownership :** Un Data Craftsman ne livre pas juste des scripts, il est garant de l'intégrité, de la qualité et de la haute disponibilité de la donnée en production."
  - "**Le Code comme Vecteur de Communication :** La lisibilité surpasse l'astuce technique. Un code 'propre' est un code auto-explicatif qui combat activement la complexité - cet ennemi qui entrave la compréhension du système."
  - "**Identifier les Symptômes de Complexité :** Elle se manifeste par le coût disproportionné d'un changement (une modification = dix impacts), une charge cognitive saturée et, surtout, par les 'inconnues inconnues' (Unknown Unknowns)."
  - "**Attaquer les Causes Racines :** Éliminez sans relâche les dépendances cachées (code non isolable) et l'obscurité (logique métier masquée par une implémentation opaque)."
  - "**La Philosophie Zero Tolerance :** La complexité est incrémentale. Elle naît de l'accumulation de micro-décisions / raccourcis. Maintenez une discipline rigoureuse au quotidien pour stopper l'entropie."
  - "**Pragmatisme & ROI :** L'excellence technique n'est pas un dogme, c'est le moteur de l'agilité. Nous codons proprement pour livrer de la valeur métier plus vite et plus longtemps."
  - "**Culture de la Transmission :** Le craftsmanship est un compagnonnage. Partagez vos patterns, pratiquez la revue de code constructive et élevez le standard de votre guilde."
  - "**Production-Ready by Design :** Anticipez l'échec. La résilience (fail-gracefully), l'observabilité et le monitoring sont intégrés dès le premier commit, pas comme une option de fin de projet."
  - "**Craftsman Tip :** Transformez l'obscur en évidence. Remplacez les structures de données génériques (tuples, dicts) via le typage fort et les Dataclasses (ex: `content/examples/transaction_processor.py`)."
  - "**Outillage Moderne :** En Python, privilégiez `uv` pour une gestion de dépendances déterministe et maintenez une documentation vivante (README, architecture ADR) pour supprimer toute friction d'onboarding."
