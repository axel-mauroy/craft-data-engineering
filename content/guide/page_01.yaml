page_number: 1
title: "Mindset du Data Craftsman"
subtitle: "L'excellence technique au service de la donnée"
content:
  - "**Ownership :** Un Data Craftsman ne livre pas juste des scripts, il est garant de l'intégrité, de la qualité et de la haute disponibilité de la donnée en production."
  - "**Le Code comme Vecteur de Communication :** La lisibilité surpasse l'astuce technique. Un code 'propre' est un code auto-explicatif qui combat activement la complexité - cet ennemi qui entrave la compréhension du système."
  - "**Rendre l'Implicite Explicite :** Transformez l'obscur en évidence. Remplacez les structures de données génériques par le typage fort : un type métier dit ce qu'il est, pas ce qu'il contient."
  - "**Identifier les Symptômes de Complexité :** Elle se manifeste par le coût disproportionné d'un changement, une charge cognitive saturée et les 'inconnues inconnues' (ex: [transaction_processor.py](https://github.com/axel-mauroy/craft-data-engineering/blob/main/content/examples/transaction_processor.py)). Éliminez sans relâche les dépendances cachées et l'obscurité."
  - "**La Philosophie Zero Tolerance :** La complexité est incrémentale. Elle naît de l'accumulation de micro-décisions. Maintenez une discipline rigoureuse au quotidien."
  - "**Pragmatisme & ROI :** L'excellence technique n'est pas un dogme, c'est le moteur de l'agilité. Nous codons proprement pour livrer de la valeur métier plus vite."
  - "**Culture de la Transmission :** Le craftsmanship est un compagnonnage. Partagez vos patterns et pratiquez la revue de code constructive."
  - "**Production-Ready by Design :** Anticipez l'échec. La résilience, l'observabilité et le monitoring sont intégrés dès le premier commit."
  - "**Supprimer la Friction :** Maintenez une [documentation vivante](https://www.sfeir.dev/documentation-as-code-definition/) et des environnements reproductibles pour qu'un nouvel arrivant soit autonome en moins d'une journée."
  - "**Le Fossé Fondamental :** Code applicatif = comportement interactif, feedback en millisecondes. Data = transformations déclaratives, feedback en heures via la BI ou le monitoring. L'excellence data se mesure différemment."
  - "**Le SQL est un langage noble :** Un modèle SQL bien structuré est aussi expressif qu'une fonction pure. La lisibilité, la modularité et la testabilité s'appliquent avec les outils du domaine. Voir [SQL Mastery (sql_mastery.sql)](https://github.com/axel-mauroy/craft-data-engineering/blob/main/content/examples/sql_mastery.sql)."
  - "**Assumer les Limites :** Un pipeline batch ne fait pas d'événements de domaine. dbt ne gère pas d'invariants transactionnels. Ce guide travaille dans ces contraintes, pas contre elles."

references:
  - "John Ousterhout (A Philosophy of Software Design)"
  - "Michael Nygard (Release It!)"
  - "Pete McBreen (Software Craftsmanship)"
  - "Robert C. Martin (Clean Code - The Boy Scout Rule)"
